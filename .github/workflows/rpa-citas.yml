name: RPA - Verificar Citas CCSS

on:
  schedule:
    # Ejecutar cada 10 minutos entre las 6 AM y 8 PM (UTC-6 = Costa Rica)
    # Esto ejecutará cada 10 minutos, 24/7, pero el script verificará internamente el horario
    #- cron: '0 * * * *'
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  check-citas:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Timeout de 10 minutos máximo por ejecución

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14.4'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Playwright
        run: |
          playwright install chromium
          playwright install-deps

      - name: Ejecutar bot de citas
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py

      - name: Registrar errores
        if: failure()
        run: echo "❌ El workflow falló. Revisa los logs."
